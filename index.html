<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OneMap - GeoPortal Infrastructure II</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="css/style.css" />

    <style>
        /* Memastikan peta memenuhi layar tanpa margin */
        html, body { 
            height: 100%; 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
        }
        #map { 
            height: 100vh; 
            width: 100%; 
        }
    </style>
</head>
<body>

    <div id="map" style="height: 100vh; width: 100%;"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/map.js"></script>

    <div class="info-panel">
        <h5>GeoPortal OneMap</h5>
        <hr>
        <div class="legend-content">
        <div class="legend-item" data-layer="site"><span class="symbol sym-site"></span> Site Location</div>
        <div class="legend-item" data-layer="bm"><span class="symbol sym-bm"></span> Bench Mark (BM)</div>
        <div class="legend-item" data-layer="sta"><span class="symbol sym-sta"></span> Titik STA</div>
        <div class="legend-item" data-layer="alinyemen"><span class="symbol sym-line"></span> Garis Alinyemen</div>
        <div class="legend-item" data-layer="row"><span class="symbol sym-row"></span> Area ROW</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
